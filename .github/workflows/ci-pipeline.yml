name: CI Pipeline – Sistema Bancário

# ──────────────────────────────────────────────────────────────────
# Gatilho: executa a cada push em QUALQUER branch e em Pull Requests
# ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: ['**']
  pull_request:
    branches: [main, develop]

jobs:

  # ================================================================
  # JOB 1 — Build + Testes Unitários (SistemaBancarioTest)
  # ================================================================
  build-e-testes-unitarios:
    name: 🔨 Build & Testes Unitários
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: ☕ Configurar JDK 17 (Temurin) com cache Maven
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🔨 Compilar projeto (sem testes)
        run: mvn clean compile --no-transfer-progress

      - name: 🧪 Executar testes unitários (Surefire → *Test.java)
        run: mvn test --no-transfer-progress

      - name: 📊 Publicar relatório – Testes Unitários (Surefire XML)
        uses: actions/upload-artifact@v4
        if: always()   # publica mesmo se os testes falharem
        with:
          name: relatorio-testes-unitarios
          path: target/surefire-reports/
          retention-days: 15

      - name: 📈 Publicar relatório – Cobertura JaCoCo (HTML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-cobertura-jacoco
          path: target/site/jacoco/
          retention-days: 15

      - name: ✅ Exibir resumo dos testes unitários
        if: always()
        run: |
          echo "================================================"
          echo "  RESULTADO – TESTES UNITÁRIOS"
          echo "================================================"
          if [ -d target/surefire-reports ]; then
            TOTAL=$(grep -l "testcase" target/surefire-reports/*.xml 2>/dev/null | wc -l)
            FALHAS=$(grep -l 'failure\|error' target/surefire-reports/*.xml 2>/dev/null | wc -l)
            echo "Suítes executadas : $TOTAL"
            echo "Suítes com falha  : $FALHAS"
          fi
          echo "================================================"

  # ================================================================
  # JOB 2 — Testes de Integração (*IT.java via Failsafe)
  # Depende do Job 1 — só roda se build + unitários passaram
  # ================================================================
  testes-integracao:
    name: 🔗 Testes de Integração
    runs-on: ubuntu-latest
    needs: build-e-testes-unitarios

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: ☕ Configurar JDK 17 (Temurin) com cache Maven
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: 🔗 Executar testes de integração (Failsafe → *IT.java)
        # mvn verify executa: compile → test → package → integration-test → verify
        run: mvn verify --no-transfer-progress

      - name: 📊 Publicar relatório – Testes de Integração (Failsafe XML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-testes-integracao
          path: target/failsafe-reports/
          retention-days: 15

      - name: ✅ Exibir resumo dos testes de integração
        if: always()
        run: |
          echo "================================================"
          echo "  RESULTADO – TESTES DE INTEGRAÇÃO"
          echo "================================================"
          echo "Classes de integração cobertas:"
          echo "  • FluxoCadastroClienteIT"
          echo "  • FluxoMovimentacaoFinanceiraIT"
          echo "  • FluxoAvancoMesIT"
          echo "  • FluxoCasosLimiteIT"
          echo "================================================"

  # ================================================================
  # JOB 3 — Resumo Final do Pipeline
  # Roda sempre, independente do resultado dos jobs anteriores
  # ================================================================
  resumo-pipeline:
    name: 📋 Resumo Final
    runs-on: ubuntu-latest
    needs: [build-e-testes-unitarios, testes-integracao]
    if: always()

    steps:
      - name: 📋 Exibir status consolidado
        run: |
          echo "╔══════════════════════════════════════════╗"
          echo "║     RESUMO DO PIPELINE CI – BANCO        ║"
          echo "╠══════════════════════════════════════════╣"
          echo "║  Build & Testes Unitários : ${{ needs.build-e-testes-unitarios.result }}"
          echo "║  Testes de Integração     : ${{ needs.testes-integracao.result }}"
          echo "╠══════════════════════════════════════════╣"

          if [[ "${{ needs.build-e-testes-unitarios.result }}" == "success" && \
                "${{ needs.testes-integracao.result }}" == "success" ]]; then
            echo "║  STATUS FINAL : ✅ PIPELINE OK           ║"
            echo "╚══════════════════════════════════════════╝"
          else
            echo "║  STATUS FINAL : ❌ PIPELINE FALHOU       ║"
            echo "╚══════════════════════════════════════════╝"
            exit 1
          fi
